name: Deploy

on:
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  build-and-package:
    name: Build and Package
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Package
        run: |
          mkdir -p package
          cp -r dist package/
          cp package.json package/
          cp README.md package/
          cp LICENSE package/ 2>/dev/null || true
          tar -czf weixin-kimi-bot.tar.gz package/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: weixin-kimi-bot-package
          path: weixin-kimi-bot.tar.gz

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-and-package
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: weixin-kimi-bot-package

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: weixin-kimi-bot.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-and-package
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/weixin-kimi-bot:latest
            ${{ secrets.DOCKER_USERNAME }}/weixin-kimi-bot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
